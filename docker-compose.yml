services:
  
  ragnarock-gasolin:
    image: vlysiumdev/ragnarock-gasolin:latest
    restart: unless-stopped

    expose:
      - "8080"

    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080

    networks:
      - proxy

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.gasolin.rule=Host(`gasolin.vlysium.dev`)"
      - "traefik.http.routers.gasolin.entrypoints=websecure"
      - "traefik.http.routers.gasolin.tls.certresolver=le"

      - "traefik.http.services.gasolin.loadbalancer.server.port=8080"

# use reverse proxy container on cloud server
networks:
  proxy:
    external: true 